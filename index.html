<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google Search</title>
  <style>
    :root {
      --bg: #0f1218;
      --surface: #171c26;
      --border: #2a3344;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6c9eff;
      --accent-dim: #4a74c4;
      --success: #5ecf8a;
      --radius: 14px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: radial-gradient(1200px 800px at 50% -10%, #1a2436 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #1f2a3c;
      border: 1px solid #3d4f6f;
      color: #d8e4ff;
      box-shadow: 0 0 0 1px rgba(108, 158, 255, 0.15), 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .progress {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .progress span {
      flex: 1;
      height: 5px;
      border-radius: 999px;
      background: #2f3b52;
    }

    .progress span.on {
      background: #7db2ff;
      box-shadow: 0 0 8px rgba(125, 178, 255, 0.55);
    }

    .card-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem 1.25rem 1.15rem;
      min-height: 220px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .card-shell:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .card-shell:hover {
      border-color: #3d4a63;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .situation {
      font-size: 1.05rem;
      font-weight: 500;
      white-space: pre-line;
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .answer-block {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .answer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .answer {
      font-size: 0.98rem;
      color: #dbe4f5;
      white-space: pre-line;
    }

    .tts-btn {
      border: 1px solid #3b4a66;
      background: #1b2434;
      color: #cfe0ff;
      padding: 0.2rem 0.45rem;
      font-size: 0.78rem;
      line-height: 1;
      border-radius: 8px;
    }

    .tts-btn:hover {
      border-color: #5c79b3;
      color: #e6efff;
    }

    .tts-voice {
      border: 1px solid #3b4a66;
      background: #111827;
      color: #d8e4ff;
      padding: 0.22rem 0.4rem;
      font-size: 0.74rem;
      border-radius: 8px;
      max-width: 170px;
    }

    .actions {
      margin-top: 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .actions .push-right {
      margin-left: auto;
    }

    button {
      font: inherit;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #222a38;
      color: var(--text);
      padding: 0.55rem 0.9rem;
      font-size: 0.88rem;
    }

    button.primary {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      border-color: transparent;
      color: #0b1020;
      font-weight: 600;
    }

    /* 진리발표 챕터 버튼: 제목이 길어도 한 줄씩 균형 있게 줄바꿈 */
    button.truth-chapter-btn {
      flex: 1 1 100%;
      width: 100%;
      max-width: 100%;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      line-height: 1.4;
      padding-block: 0.75rem;
      padding-inline: 1.1rem;
    }

    button.ghost {
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .done {
      text-align: center;
      padding: 2rem 1rem;
    }

    .done h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }

    .error {
      background: #2a1518;
      border: 1px solid #5c2a32;
      color: #f0c4c8;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }

    .error code {
      font-size: 0.82em;
    }

    footer.note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .gate-panel {
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border-radius: var(--radius);
      background: #1a2230;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .gate-panel strong {
      color: var(--accent);
      font-weight: 600;
    }

    .gate-rows {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .gate-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .gate-row span.n {
      min-width: 2.5rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .gate-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }

    .gate-bar i {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      max-width: 100%;
    }

    .note-block {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px dashed var(--border);
      font-size: 0.88rem;
      color: #b8c2d4;
    }

    .note-block .note-body {
      white-space: pre-line;
      line-height: 1.5;
    }

    .answer .click-en {
      cursor: pointer;
      border-bottom: 1px dotted rgba(125, 178, 255, 0.45);
      padding: 0 0.02em;
      border-radius: 2px;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .answer .click-en:hover,
    .answer .click-en:focus {
      outline: none;
      background: rgba(108, 158, 255, 0.18);
      border-bottom-color: rgba(125, 178, 255, 0.85);
    }

    .word-def-panel {
      margin-top: 1rem;
      padding: 0.75rem 0.9rem 0.85rem;
      border-radius: var(--radius);
      background: #141a24;
      border: 1px solid #3d4d6a;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      font-size: 0.86rem;
      line-height: 1.45;
      max-height: min(42vh, 320px);
      overflow: auto;
    }

    .word-def-panel[hidden] {
      display: none !important;
    }

    .word-def-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .word-def-top strong {
      font-size: 0.95rem;
      color: #e4ecff;
    }

    .word-def-ko-main {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 600;
      color: #eef3fc;
      line-height: 1.55;
    }

    .word-def-error {
      color: #f0b8c0;
      font-size: 0.85rem;
    }

    .example-item {
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      background: #111827;
      border: 1px solid #2d3a52;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .example-item .ex-ko {
      color: var(--muted);
      margin-bottom: 0.25rem;
      font-size: 0.8rem;
    }

    .example-item .ex-en {
      color: #dbe4f5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>English Random Card</h1>
      <span class="meta" id="dateLine"></span>
    </header>
    <div id="app"></div>
    <div id="wordDefPanel" class="word-def-panel" hidden aria-live="polite">
      <div class="word-def-top">
        <strong id="wordDefTitle"></strong>
        <div style="display:flex;gap:0.35rem;align-items:center;flex-shrink:0;">
          <button type="button" class="tts-btn" id="btnWordDefSpeak" aria-label="이 단어 듣기">🔊</button>
          <button type="button" class="tts-btn word-def-dismiss" aria-label="뜻 패널 닫기">
            닫기
          </button>
        </div>
      </div>
      <div id="wordDefBody" class="word-def-body"></div>
    </div>
    <footer class="note">
      데이터: <code>data/cards.json</code>, <code>data/truth.json</code>, <code>data/verbs.json</code> · 로컬에서 열 때는 <code>python3 -m http.server</code> 등으로 같은 폴더를 서빙한 뒤 접속하세요.
    </footer>
  </div>

  <script>
    (function () {
      const DAILY_DATA_URL = "data/cards.json";
      const TRUTH_DATA_URL = "data/truth.json";
      const VERBS_DATA_URL = "data/verbs.json";
      const STORAGE_KEY = "english-random-card-session";
      const STORAGE_VERSION = 3;
      const PROGRESS_KEY = "english-random-card-study-progress";
      const PROGRESS_VERSION = 1;
      const TTS_VOICE_KEY = "english-random-card-tts-voice-uri";
      const TTS_RATE_KEY = "english-random-card-tts-rate";
      /** 카드 첫 화면: "ko" = 한국어(상황), "en" = 영어(모범답) */
      const CARD_FACE_KEY = "english-random-card-card-face";
      /** studyDate 기준: 오늘 6회 → 어제 4회 → 그제 2회 순차 게이트 후, 날짜 구간별 6:4:2 가중 */
      const SEQ_GOALS = { today: 6, yesterday: 4, dayBefore: 2 };
      /** 같은 날 같은 카드가 두 번 나오지 않도록 고정 */
      const ALLOW_SAME_CARD_TWICE_SAME_DAY = false;
      const WEIGHTS = { latest: 6, prev: 4, older: 2 };
      const DAILY_COUNT = 3;
      const MAX_SAMPLE_TRIES = 200;
      const MYMEMORY_TRANSLATE =
        "https://api.mymemory.translated.net/get?langpair=en%7Cko&q=";
      const DICTIONARY_API = "https://api.dictionaryapi.dev/api/v2/entries/en/";
      /**
       * gtx 요청이 막힐 때를 대비한 Google Cloud Translation API(v2) 키(선택).
       *   localStorage.setItem('english-random-card-google-translate-key', 'API_키');
       */
      const GOOGLE_TRANSLATE_API_KEY = "";
      const LS_GOOGLE_TRANSLATE_KEY = "english-random-card-google-translate-key";

      let wordLookupAbort = null;
      let wordDefLookupKey = "";

      function todayKey() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function addCalendarDays(ymd, deltaDays) {
        const [y, m, d] = ymd.split("-").map(Number);
        const dt = new Date(y, m - 1, d);
        dt.setDate(dt.getDate() + deltaDays);
        const yy = dt.getFullYear();
        const mm = String(dt.getMonth() + 1).padStart(2, "0");
        const dd = String(dt.getDate()).padStart(2, "0");
        return `${yy}-${mm}-${dd}`;
      }

      function deckFingerprint(cards) {
        return `${cards.length}|${cards.map((c) => `${c.id}:${c.studyDate}`).sort().join(",")}`;
      }

      function maxRound(cards) {
        return cards.reduce((m, c) => Math.max(m, c.round), -Infinity);
      }

      function validateDailyCards(raw) {
        if (!Array.isArray(raw)) throw new Error("JSON 최상위는 배열이어야 합니다.");

        // chapter 포맷(truth.json 스타일) 자동 감지: 첫 항목에 정수 chapter 필드가 있으면 flatten
        if (raw.length > 0 && raw[0] && Number.isInteger(raw[0].chapter)) {
          const out = [];
          raw.forEach((ch, ci) => {
            if (!ch || typeof ch !== "object") throw new Error(`챕터 ${ci}: 객체가 아닙니다.`);
            if (!Number.isInteger(ch.chapter)) throw new Error(`챕터 ${ci}: chapter는 정수여야 합니다.`);
            const studyDate =
              typeof ch.studyDate === "string" && /^\d{4}-\d{2}-\d{2}$/.test(ch.studyDate.trim())
                ? ch.studyDate.trim()
                : todayKey();
            if (!Array.isArray(ch.cards) || ch.cards.length === 0)
              throw new Error(`챕터 ${ch.chapter}: cards는 비어 있지 않은 배열이어야 합니다.`);
            ch.cards.forEach((card, i) => {
              if (!card || typeof card !== "object") throw new Error(`챕터 ${ch.chapter} 카드 ${i}: 객체가 아닙니다.`);
              const situation = card.situation;
              const answer = card.answer;
              if (typeof situation !== "string" || !situation.trim())
                throw new Error(`챕터 ${ch.chapter} 카드 ${i}: situation은 비어 있지 않은 문자열이어야 합니다.`);
              if (typeof answer !== "string" || !answer.trim())
                throw new Error(`챕터 ${ch.chapter} 카드 ${i}: answer은 비어 있지 않은 문자열이어야 합니다.`);
              const id = card.id != null ? `ch${ch.chapter}-${card.id}` : `ch${ch.chapter}-idx${i}`;
              out.push({
                id,
                round: ch.chapter,
                studyDate,
                situation: situation.trim(),
                answer: answer.trim(),
                note: typeof card.note === "string" ? card.note.trim() : "",
              });
            });
          });
          if (out.length === 0) throw new Error("카드가 한 장도 없습니다.");
          return out;
        }

        // 기존 flat 포맷
        const out = [];
        raw.forEach((row, i) => {
          if (!row || typeof row !== "object") throw new Error(`항목 ${i}: 객체가 아닙니다.`);
          const situation = row.situation;
          const answer = row.answer;
          const round = row.round;
          const studyDate = row.studyDate;
          if (typeof situation !== "string" || !situation.trim()) {
            throw new Error(`항목 ${i}: situation은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (typeof answer !== "string" || !answer.trim()) {
            throw new Error(`항목 ${i}: answer은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (!Number.isInteger(round)) {
            throw new Error(`항목 ${i}: round는 정수여야 합니다.`);
          }
          if (typeof studyDate !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(studyDate.trim())) {
            throw new Error(
              `항목 ${i}: studyDate는 YYYY-MM-DD 형식 문자열이어야 합니다. (예: "2026-04-19")`
            );
          }
          const id =
            typeof row.id === "string" && row.id.trim()
              ? row.id
              : `idx-${i}`;
          out.push({
            id,
            round,
            studyDate: studyDate.trim(),
            situation: situation.trim(),
            answer: answer.trim(),
            note: typeof row.note === "string" ? row.note.trim() : "",
          });
        });
        if (out.length === 0) throw new Error("카드가 한 장도 없습니다.");
        return out;
      }

      function validateTruthChapters(raw) {
        if (!Array.isArray(raw)) throw new Error("JSON 최상위는 배열이어야 합니다.");
        const out = raw.map((row, i) => {
          if (!row || typeof row !== "object") throw new Error(`챕터 ${i}: 객체가 아닙니다.`);
          const chapter = row.chapter;
          const title = row.title;
          const cards = row.cards;
          if (!Number.isInteger(chapter)) {
            throw new Error(`챕터 ${i}: chapter는 정수여야 합니다.`);
          }
          if (typeof title !== "string" || !title.trim()) {
            throw new Error(`챕터 ${i}: title은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (!Array.isArray(cards) || cards.length === 0) {
            throw new Error(`챕터 ${i}: cards는 비어 있지 않은 배열이어야 합니다.`);
          }
          const normalizedCards = cards.map((card, ci) => {
            if (!card || typeof card !== "object") {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: 객체가 아닙니다.`);
            }
            if (!Number.isInteger(card.id)) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: id는 정수여야 합니다.`);
            }
            const situation = card.situation;
            const answer = card.answer;
            if (typeof situation !== "string" || !situation.trim()) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: situation은 비어 있지 않은 문자열이어야 합니다.`);
            }
            if (typeof answer !== "string" || !answer.trim()) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: answer은 비어 있지 않은 문자열이어야 합니다.`);
            }
            return {
              id: `${chapter}-${card.id}`,
              localId: card.id,
              situation: situation.trim(),
              answer: answer.trim(),
              note: typeof card.note === "string" ? card.note.trim() : "",
              examples: Array.isArray(card.examples)
                ? card.examples
                    .filter((e) => e && typeof e.situation === "string" && typeof e.answer === "string")
                    .map((e) => ({ situation: e.situation.trim(), answer: e.answer.trim() }))
                : [],
            };
          });
          return {
            chapter,
            title: title.trim(),
            cards: normalizedCards,
          };
        });
        if (out.length === 0) throw new Error("카드가 한 장도 없습니다.");
        return out;
      }

      function isVerbUnitBlock(row) {
        return !!(row && typeof row === "object" && Array.isArray(row.cards));
      }

      function normalizeVerbCards(verbKey, unitId, rows, pathLabel) {
        if (!rows.length) {
          throw new Error(`${pathLabel}: cards 배열에 예문이 한 개 이상 있어야 합니다.`);
        }
        return rows.map((row, i) => {
          if (!row || typeof row !== "object") {
            throw new Error(`${pathLabel} 예문 ${i}: 객체가 아닙니다.`);
          }
          const english = row.english;
          const korean = row.korean;
          const note = row.note;
          if (typeof english !== "string" || !english.trim()) {
            throw new Error(`${pathLabel} 예문 ${i}: english는 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (typeof korean !== "string" || !korean.trim()) {
            throw new Error(`${pathLabel} 예문 ${i}: korean은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (typeof note !== "string" || !note.trim()) {
            throw new Error(`${pathLabel} 예문 ${i}: note는 비어 있지 않은 문자열이어야 합니다.`);
          }
          return {
            id: `${verbKey}:${unitId}:${i}`,
            english: english.trim(),
            korean: korean.trim(),
            note: note.trim(),
          };
        });
      }

      /**
       * 기본동사: 최상위 키 = 동사(그룹) 식별자.
       * (단일) 플랫 예문만: "have": [ { english, korean, note }, ... ]
       * (복수 의미/day) 블록: "have": [ { "id": "day1", "focus"|"title", "cards": [ ... ] }, ... ]
       */
      function validateVerbLexicon(raw) {
        if (!raw || typeof raw !== "object" || Array.isArray(raw)) {
          throw new Error("기본동사 JSON 최상위는 객체여야 합니다.");
        }
        const keys = Object.keys(raw).sort((a, b) => a.localeCompare(b, "ko"));
        const groups = [];
        for (const key of keys) {
          const arr = raw[key];
          if (!Array.isArray(arr) || arr.length === 0) {
            throw new Error(`동사 "${key}": 내용 배열이 비어 있지 않아야 합니다.`);
          }
          const unitLike = arr.filter(isVerbUnitBlock);
          if (unitLike.length > 0 && unitLike.length !== arr.length) {
            throw new Error(
              `동사 "${key}": 예문 객체와 단위 블록({ cards: [...] })을 한 배열에 섞지 마세요. 둘 중 한 형식만 쓰면 됩니다.`
            );
          }

          let units;
          if (unitLike.length === arr.length) {
            units = arr.map((block, bi) => {
              const fallbackId = `unit-${bi}`;
              let unitId = block.id != null ? String(block.id).trim() : "";
              if (!unitId) unitId = fallbackId;
              const focus =
                typeof block.focus === "string" && block.focus.trim()
                  ? block.focus.trim()
                  : typeof block.title === "string" && block.title.trim()
                    ? block.title.trim()
                    : "";
              const label = focus || unitId;
              const pathLabel = `동사 "${key}" · ${unitId}`;
              const cards = normalizeVerbCards(key, unitId, block.cards, pathLabel);
              return { unitId, label, cards };
            });
          } else {
            const cards = normalizeVerbCards(key, "all", arr, `동사 "${key}"`);
            units = [{ unitId: "all", label: "", cards }];
          }

          let totalCards = 0;
          for (const u of units) totalCards += u.cards.length;
          groups.push({ key, units, cardCount: totalCards });
        }
        if (groups.length === 0) throw new Error("등록된 동사 그룹이 없습니다.");
        return groups;
      }

      function findVerbUnit(groups, verbKey, unitId) {
        const g = groups.find((x) => x.key === verbKey);
        if (!g) return null;
        return g.units.find((u) => u.unitId === unitId) || null;
      }

      function allMeetGoal(pool, counts, goal) {
        if (!pool.length) return true;
        return pool.every((c) => (counts[c.id] || 0) >= goal);
      }

      /** 오늘 → 어제 → 그제 순으로, 해당 날짜 카드가 목표 회수에 도달했는지 검사 */
      function getSequentialGate(cards, todayStr, counts) {
        const steps = [
          { day: todayStr, goal: SEQ_GOALS.today },
          { day: addCalendarDays(todayStr, -1), goal: SEQ_GOALS.yesterday },
          { day: addCalendarDays(todayStr, -2), goal: SEQ_GOALS.dayBefore },
        ];
        for (const { day, goal } of steps) {
          const pool = cards.filter((c) => c.studyDate === day);
          if (!pool.length) continue;
          if (!allMeetGoal(pool, counts, goal)) return { pool, goal, day };
        }
        return null;
      }

      function partitionByRelativeStudyDate(cards, todayStr) {
        const y1 = addCalendarDays(todayStr, -1);
        const latest = cards.filter((c) => c.studyDate === todayStr);
        const prev = cards.filter((c) => c.studyDate === y1);
        const older = cards.filter((c) => c.studyDate < y1);
        return { latest, prev, older };
      }

      function loadProgress(cards) {
        try {
          const raw = localStorage.getItem(PROGRESS_KEY);
          if (!raw) return { counts: {} };
          const o = JSON.parse(raw);
          if (o.version !== PROGRESS_VERSION) return { counts: {} };
          const counts = {};
          for (const c of cards) {
            const v = o.counts && o.counts[c.id];
            counts[c.id] =
              typeof v === "number" && Number.isFinite(v) ? Math.max(0, Math.floor(v)) : 0;
          }
          return { counts };
        } catch {
          return { counts: {} };
        }
      }

      function saveProgress(cards, counts) {
        const o = {};
        for (const c of cards) {
          o[c.id] = counts[c.id] || 0;
        }
        localStorage.setItem(
          PROGRESS_KEY,
          JSON.stringify({ version: PROGRESS_VERSION, counts: o })
        );
      }

      function pickWeightedTier(tiers, weights) {
        const entries = [
          { key: "latest", cards: tiers.latest, w: weights.latest },
          { key: "prev", cards: tiers.prev, w: weights.prev },
          { key: "older", cards: tiers.older, w: weights.older },
        ].filter((e) => e.cards.length > 0);
        if (entries.length === 0) return null;
        const total = entries.reduce((s, e) => s + e.w, 0);
        let r = Math.random() * total;
        for (const e of entries) {
          r -= e.w;
          if (r <= 0) return e;
        }
        return entries[entries.length - 1];
      }

      function pickRandomFrom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      /** Fisher–Yates. JSON·id 순서와 무관하게 그날 1→2→3번째 순서를 만듦. */
      function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      /**
       * studyDate 기준 달력 오늘/어제/그제 순차 게이트(6·4·2회) 통과 전에는 해당 구간 카드만 출제.
       * 통과 후에는 오늘/어제/그 이전 날짜 묶음에 가중치 6:4:2.
       */
      function pickDailyCards(cards, completionCounts) {
        const todayStr = todayKey();
        const counts = completionCounts || {};
        const gate = getSequentialGate(cards, todayStr, counts);

        if (gate) {
          const pool = gate.pool.slice();
          shuffleInPlace(pool);
          const n = Math.min(DAILY_COUNT, pool.length);
          const chosen = pool.slice(0, n);
          return { picks: chosen, gated: true };
        }

        const tiers = partitionByRelativeStudyDate(cards, todayStr);
        const mutable = {
          latest: tiers.latest.slice(),
          prev: tiers.prev.slice(),
          older: tiers.older.slice(),
        };
        const chosen = [];
        const used = new Set();

        const totalAvailable = cards.length;
        const target = Math.min(DAILY_COUNT, totalAvailable);

        let tries = 0;
        while (chosen.length < target && tries < MAX_SAMPLE_TRIES) {
          tries++;
          const entry = pickWeightedTier(mutable, WEIGHTS);
          if (!entry) break;
          const poolKey = entry.key;
          const pool =
            poolKey === "latest" ? mutable.latest : poolKey === "prev" ? mutable.prev : mutable.older;
          if (pool.length === 0) continue;
          const card = pickRandomFrom(pool);
          if (!ALLOW_SAME_CARD_TWICE_SAME_DAY && used.has(card.id)) continue;
          used.add(card.id);
          chosen.push(card);
          const idx = pool.findIndex((c) => c.id === card.id);
          if (idx !== -1) pool.splice(idx, 1);
        }

        if (chosen.length < target) {
          const rest = cards.filter((c) => !used.has(c.id));
          while (chosen.length < target && rest.length > 0) {
            const c = pickRandomFrom(rest);
            const i = rest.findIndex((x) => x.id === c.id);
            rest.splice(i, 1);
            if (!ALLOW_SAME_CARD_TWICE_SAME_DAY && used.has(c.id)) continue;
            used.add(c.id);
            chosen.push(c);
          }
        }

        shuffleInPlace(chosen);
        return { picks: chosen, gated: false };
      }

      function loadSession() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const o = JSON.parse(raw);
          if (o.version !== STORAGE_VERSION || !o.date || !Array.isArray(o.pickIds)) return null;
          return o;
        } catch {
          return null;
        }
      }

      function saveSession(state) {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            version: STORAGE_VERSION,
            date: state.date,
            pickIds: state.pickIds,
            index: state.index,
            revealed: state.revealed,
            fingerprint: state.fingerprint,
          })
        );
      }

      function clearSession() {
        localStorage.removeItem(STORAGE_KEY);
      }

      function clearProgress() {
        localStorage.removeItem(PROGRESS_KEY);
      }

      function resolvePicksFromSession(cards, session) {
        const map = new Map(cards.map((c) => [c.id, c]));
        const picks = session.pickIds.map((id) => map.get(id)).filter(Boolean);
        if (picks.length !== session.pickIds.length) return null;
        return picks;
      }

      function getOrCreateDailyState(cards, progress) {
        const date = todayKey();
        const fp = deckFingerprint(cards);
        const session = loadSession();
        if (
          session &&
          session.date === date &&
          session.fingerprint === fp &&
          session.pickIds &&
          session.pickIds.length > 0
        ) {
          const picks = resolvePicksFromSession(cards, session);
          if (picks && picks.length === session.pickIds.length) {
            const rawIdx = session.index ?? 0;
            const done = rawIdx >= picks.length;
            return {
              date,
              fingerprint: fp,
              picks,
              index: done ? picks.length : Math.max(0, Math.min(rawIdx, picks.length - 1)),
              revealed: done ? false : !!session.revealed,
            };
          }
        }
        const { picks } = pickDailyCards(cards, progress.counts);
        const st = {
          date,
          fingerprint: fp,
          picks,
          index: 0,
          revealed: false,
        };
        saveSession({
          date: st.date,
          pickIds: st.picks.map((c) => c.id),
          index: st.index,
          revealed: st.revealed,
          fingerprint: st.fingerprint,
        });
        return st;
      }

      function persistProgress(state) {
        saveSession({
          date: state.date,
          pickIds: state.picks.map((c) => c.id),
          index: state.index,
          revealed: state.revealed,
          fingerprint: state.fingerprint,
        });
      }

      const app = document.getElementById("app");
      const dateLine = document.getElementById("dateLine");

      function gatePanelHtml(cards, progress) {
        const todayStr = todayKey();
        const gate = getSequentialGate(cards, todayStr, progress.counts);
        if (!gate) return "";
        const rows = gate.pool
          .map((c) => {
            const n = progress.counts[c.id] || 0;
            const pct = Math.min(100, (n / gate.goal) * 100);
            const short =
              c.situation.length > 36 ? `${escapeHtml(c.situation.slice(0, 36))}…` : escapeHtml(c.situation);
            return `<div class="gate-row"><span class="n">${n}/${gate.goal}</span><div class="gate-bar"><i style="width:${pct}%"></i></div><span>${short}</span></div>`;
          })
          .join("");
        const phase =
          gate.day === todayStr
            ? "오늘 날짜"
            : gate.day === addCalendarDays(todayStr, -1)
              ? "어제 날짜"
              : "그제 날짜";
        return `<div class="gate-panel">
          <strong>${phase} (${escapeHtml(gate.day)})</strong> 카드만 나옵니다. 각 카드마다 답 확인 후 「다음/완료」를 <strong>${gate.goal}회</strong> 채우면 다음 단계로 넘어갑니다. 전 단계를 마치면 일일 추첨에 <strong>6 : 4 : 2</strong>(오늘·어제·그 이전 날짜) 비율이 적용됩니다.
          <div class="gate-rows">${rows}</div>
        </div>`;
      }

      /** 일상·진리발표: situation=한국어, answer=영어. 설정에 따라 앞뒤면 순서를 바꿉니다. */
      function buildSituationAnswerCardMain(card, revealed) {
        const koFirst = isKoreanCardFaceFirst();
        const englishBlock = `<div class="answer-head">
              <div class="label">영어</div>
              <div style="display:flex;align-items:center;gap:0.35rem;">
                ${getVoiceOptionsHtml()}
                <button type="button" class="tts-btn" id="btnSpeakAnswer" aria-label="영어 문장 듣기">🔊 듣기</button>
              </div>
            </div>
            <div class="answer" data-en-context="${escapeHtml(card.answer)}">${englishWordsInteractiveHtml(card.answer)}</div>`;
        const frontHint = koFirst
          ? `<p class="hint">말해 본 뒤 카드를 눌러 영어 답을 확인하세요.</p>`
          : `<p class="hint">한국어 상황문을 떠올린 뒤 카드를 눌러 확인하세요.</p>`;
        const frontBlock = koFirst
          ? `<div class="label">한국어</div>
            <div class="situation">${escapeHtml(card.situation)}</div>

          : `${englishBlock}
            ${frontHint}`;

          ? `<div class="note-block">
              <div class="label">메모</div>
              <div class="note-body">${escapeHtml(card.note)}</div>
            </div>`
          : "";
        const examples = card.examples;
        const examplesToggle =
          examples && examples.length
            ? `<div style="margin-top:0.75rem;">
                <button type="button" class="ghost" id="btnToggleExamples" style="font-size:0.8rem;color:var(--accent);border-color:#2a3a5c;padding:0.3rem 0.65rem;">예문 ${examples.length}개 보기</button>
                <div id="examplesBlock" style="display:none;margin-top:0.55rem;flex-direction:column;gap:0.55rem;">
                  ${examples
                    .map(
                      (ex) => `<div class="example-item">
                    <div class="ex-ko">${escapeHtml(ex.situation)}</div>
                    <div class="ex-en">${escapeHtml(ex.answer)}</div>
                  </div>`
                    )
                    .join("")}
                </div>
              </div>`
            : "";
        const backBlock = koFirst
          ? `<div class="label">한국어</div>
            <div class="situation">${escapeHtml(card.situation)}</div>
            <div class="answer-block">
              ${englishBlock}
              ${noteBlock}
              ${examplesToggle}
            </div>`
          : `${englishBlock}
            <div class="answer-block">
              <div class="label">한국어</div>
              <div class="situation">${escapeHtml(card.situation)}</div>
              ${noteBlock}
              ${examplesToggle}
            </div>`;
        return revealed ? backBlock : frontBlock;
      }

      function initExamplesToggle() {
        const btn = document.getElementById("btnToggleExamples");
        const block = document.getElementById("examplesBlock");
        if (!btn || !block) return;
        const total = block.children.length;
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const isHidden = block.style.display === "none";
          block.style.display = isHidden ? "flex" : "none";
          btn.textContent = isHidden ? "예문 숨기기" : `예문 ${total}개 보기`;
        });
      }

      /** 기본동사: korean / english+note */
      function buildVerbCardMain(card, revealed) {
        const koFirst = isKoreanCardFaceFirst();
        const englishHead = `<div class="answer-head">
              <div class="label">영어</div>
              <div style="display:flex;align-items:center;gap:0.35rem;">
                ${getVoiceOptionsHtml()}
                <button type="button" class="tts-btn" id="btnVerbSpeakEnglish" aria-label="영어 문장 듣기">🔊 듣기</button>
              </div>
            </div>
            <div class="answer" data-en-context="${escapeHtml(card.english)}">${englishWordsInteractiveHtml(card.english)}</div>`;
        const noteBlock = `<div class="note-block">
              <div class="label">메모</div>
              <div class="note-body">${escapeHtml(card.note)}</div>
            </div>`;
        if (koFirst) {
          const tail = revealed
            ? `<div class="answer-block">
                ${englishHead}
                ${noteBlock}
              </div>`
            : `<p class="hint">영어로 말해 본 뒤 카드를 눌러 답과 메모를 확인하세요.</p>`;
          return `<div class="label">한국어</div>
            <div class="situation">${escapeHtml(card.korean)}</div>
            ${tail}`;
        }
        if (revealed) {
          return `${englishHead}
            <div class="answer-block">
              <div class="label">한국어</div>
              <div class="situation">${escapeHtml(card.korean)}</div>
              ${noteBlock}
            </div>`;
        }
        return `${englishHead}
          <p class="hint">한국어와 메모를 떠올린 뒤 카드를 눌러 확인하세요.</p>`;
      }

      function renderDaily(state, cards, progress) {
        const { picks, index, revealed } = state;
        dateLine.textContent = todayKey();

        if (picks.length === 0) {
          app.innerHTML = `<div class="error">표시할 카드가 없습니다.</div>`;
          return;
        }

        if (index >= picks.length) {
          app.innerHTML = `
            <div class="done">
              <h2>오늘 3장 완료</h2>
              <p class="meta">내일 다시 만나요.</p>
              <div class="actions" style="justify-content:center;margin-top:1rem;">
                <button type="button" class="ghost" id="btnReset">오늘 다시 뽑기 (테스트)</button>
                <button type="button" class="ghost" id="btnModeSelectDone">모드 선택</button>
              </div>
            </div>`;
          document.getElementById("btnReset").onclick = () => {
            clearSession();
            location.reload();
          };
          document.getElementById("btnModeSelectDone").onclick = () => {
            renderModePicker();
          };
          return;
        }

        const card = picks[index];
        const roundLabel = `Round ${card.round} · ${escapeHtml(card.studyDate)}`;
        const bars = picks
          .map((_, i) => `<span class="${i <= index ? "on" : ""}"></span>`)
          .join("");
        const cardMain = buildSituationAnswerCardMain(card, revealed);

        app.innerHTML = `
          ${gatePanelHtml(cards, progress)}
          <div class="progress">${bars}</div>
          <div class="pill" style="margin-bottom:0.75rem;">${roundLabel} · ${index + 1} / ${picks.length}</div>
          <div class="card-shell" id="cardTap" tabindex="0" role="button" aria-label="카드 뒤집기 또는 답 보기">
            ${cardMain}
          </div>
          <div class="actions">
            ${
              revealed
                ? `<button type="button" class="primary" id="btnNext">${
                    index < picks.length - 1 ? "다음 카드" : "완료"
                  }</button>`
                : ""
            }
            <button type="button" class="ghost" id="btnReset">오늘 다시 뽑기</button>
            <button type="button" class="ghost" id="btnModeSelect">모드 선택</button>
          </div>
        `;

        const shell = document.getElementById("cardTap");
        const goReveal = () => {
          if (state.revealed) return;
          state.revealed = true;
          persistProgress(state);
          renderDaily(state, cards, progress);
        };
        shell.addEventListener("click", (e) => {
          if (e.target.closest("button, select, .click-en")) return;
          if (!state.revealed) goReveal();
        });
        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (!state.revealed) goReveal();
          }
        });

        const btnNext = document.getElementById("btnNext");
        if (btnNext) {
          btnNext.onclick = () => {
            const current = picks[index];
            if (state.revealed && current) {
              progress.counts[current.id] = (progress.counts[current.id] || 0) + 1;
              saveProgress(cards, progress.counts);
            }
            state.index += 1;
            state.revealed = false;
            persistProgress(state);
            renderDaily(state, cards, progress);
          };
        }
        document.getElementById("btnReset").onclick = () => {
          if (confirm("오늘 뽑은 카드를 버리고 다시 뽑을까요? (날짜별 6·4·2 진도는 유지됩니다)")) {
            clearSession();
            location.reload();
          }
        };
        document.getElementById("btnModeSelect").onclick = () => {
          renderModePicker();
        };
        const btnSpeakAnswer = document.getElementById("btnSpeakAnswer");
        if (btnSpeakAnswer) {
          btnSpeakAnswer.onclick = () => {
            speakEnglish(card.answer);
          };
        }
        const ttsVoiceSelect = document.getElementById("ttsVoiceSelect");
        if (ttsVoiceSelect) {
          ttsVoiceSelect.onchange = () => {
            const uri = String(ttsVoiceSelect.value || "");
            setSavedVoiceUri(uri);
          };
        }
        initExamplesToggle();
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function normalizeEnglishLookup(raw) {
        if (!raw || typeof raw !== "string") return "";
        return raw.toLowerCase().replace(/^[^\w']+|[^\w']+$/g, "");
      }

      /** 영문 답 줄: 단어 단위 탭 가능한 HTML */
      function englishWordsInteractiveHtml(text) {
        if (!text || typeof text !== "string") return "";
        const parts = text.split(/(\s+)/);
        let wordIndex = 0;
        return parts
          .map((part) => {
            if (/^\s+$/.test(part)) return escapeHtml(part);
            if (!/[a-zA-Z]/.test(part)) return escapeHtml(part);
            const key = normalizeEnglishLookup(part);
            if (!key) return escapeHtml(part);
            const disp = escapeHtml(part);
            const safeLabel = escapeHtml(key);
            const html = `<span class="click-en" tabindex="0" role="button" aria-label="${safeLabel}, 한글 번역 보기" data-w="${escapeHtml(key)}" data-wi="${wordIndex}">${disp}</span>`;
            wordIndex += 1;
            return html;
          })
          .join("");
      }

      function getContextWordParts(text) {
        if (!text || typeof text !== "string") return [];
        const parts = text.split(/(\s+)/);
        const words = [];
        for (const part of parts) {
          if (/^\s+$/.test(part)) continue;
          if (!/[a-zA-Z]/.test(part)) continue;
          const key = normalizeEnglishLookup(part);
          if (!key) continue;
          const cleaned = part.replace(/^[^\w']+|[^\w']+$/g, "").trim();
          words.push({ key, raw: cleaned || key });
        }
        return words;
      }

      function inferPreferredPos(sentence, wordIndex) {
        const words = getContextWordParts(sentence);
        if (!words.length) return "";
        const wi = Number.isInteger(wordIndex) ? wordIndex : -1;
        if (wi < 0 || wi >= words.length) return "";
        const prev = (words[wi - 1] && words[wi - 1].key) || "";
        const prev2 = (words[wi - 2] && words[wi - 2].key) || "";
        const determiners = new Set(["a", "an", "the", "this", "that", "these", "those"]);
        const degree = new Set(["very", "so", "too", "quite", "rather", "more", "most"]);
        const pronouns = new Set(["i", "you", "we", "they", "he", "she", "it"]);

        if (degree.has(prev)) return "adjective";
        if (determiners.has(prev)) return "adjective";
        if (determiners.has(prev2) && degree.has(prev)) return "adjective";
        if (prev === "to") return "verb";
        if (pronouns.has(prev)) return "verb";
        return "";
      }

      function canonicalPosLabel(pos) {
        const s = String(pos || "").toLowerCase();
        if (s.includes("adj") || s.includes("형용")) return "adjective";
        if (s.includes("verb") || s.includes("동사")) return "verb";
        if (s.includes("noun") || s.includes("명사")) return "noun";
        if (s.includes("adverb") || s.includes("부사")) return "adverb";
        return s.trim();
      }

      function posLabelKorean(pos) {
        const p = canonicalPosLabel(pos);
        if (p === "verb") return "동사";
        if (p === "noun") return "명사";
        if (p === "adjective") return "형용사";
        if (p === "adverb") return "부사";
        if (p === "pronoun") return "대명사";
        if (p === "preposition") return "전치사";
        if (p === "conjunction") return "접속사";
        if (p === "interjection") return "감탄사";
        return p || "";
      }

      function closeWordDefinitionPanel() {
        const panel = document.getElementById("wordDefPanel");

      async function translateEnToKoMyMemory(text, signal) {
        const url = MYMEMORY_TRANSLATE + encodeURIComponent(text);
        const res = await fetch(url, { signal });
        const j = await res.json();
        if (j.quotaFinished) throw new Error("번역 한도가 찼습니다. 잠시 후 다시 시도하세요.");
        if (Number(j.responseStatus) !== 200) {
          throw new Error((j.responseDetails && String(j.responseDetails)) || "번역 응답 오류");
        }
        const out = j.responseData && j.responseData.translatedText;
        if (!out || !String(out).trim()) throw new Error("번역 결과가 비어 있습니다.");
        return String(out).trim();
      }

      async function translateEnToKoGoogleCloud(text, apiKey, signal) {
        const url =
          "https://translation.googleapis.com/language/translate/v2?key=" + encodeURIComponent(apiKey);
        const res = await fetch(url, {
          method: "POST",
          signal,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ q: text, source: "en", target: "ko", format: "text" }),
        });
        const j = await res.json();
        if (!res.ok) {
          const msg = (j.error && j.error.message) || res.statusText || "Google 번역 오류";
          throw new Error(msg);
        }
        const first = j.data && j.data.translations && j.data.translations[0];
        const out = first && first.translatedText;
        if (!out || !String(out).trim()) throw new Error("Google 번역 결과가 비어 있습니다.");
        return String(out).trim();
      }

      /** translate.googleapis.com translate_a/single (client=gtx) — 브라우저에서 CORS 허용, 크롬 빠른 번역과 동일 계열. */
      function parseGtxTranslateJson(data) {
        const row = data && data[0];
        if (!Array.isArray(row)) return "";
        const parts = [];
        for (let i = 0; i < row.length; i++) {
          const cell = row[i];
          if (Array.isArray(cell) && cell.length > 0 && typeof cell[0] === "string") parts.push(cell[0]);
        }
        return parts.join("");
      }

      async function translateEnToKoGtx(text, signal) {
        const url =
          "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=" +
          encodeURIComponent(text);
        const res = await fetch(url, { signal });
        if (!res.ok) throw new Error("Google 번역(gtx) 응답 " + res.status);
        const raw = await res.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error("Google 번역(gtx) 형식 오류");
        }
        const out = parseGtxTranslateJson(data);
        if (!String(out || "").trim()) throw new Error("Google 번역(gtx) 결과가 비었습니다.");
        return String(out).trim();
      }

      async function translateWordWithContextBias(word, contextSentence, wordIndex, signal) {
        const url =
          "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&dt=bd&q=" +
          encodeURIComponent(word);
        const res = await fetch(url, { signal });
        if (!res.ok) throw new Error("Google 단어 번역 응답 " + res.status);
        const raw = await res.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error("Google 단어 번역 형식 오류");
        }

        const direct = (data && data[0] && data[0][0] && data[0][0][0]) || "";
        const dictRows = Array.isArray(data && data[1]) ? data[1] : [];
        const preferredPos = inferPreferredPos(contextSentence, wordIndex);

        let picked = "";
        let pickedPos = "";
        if (preferredPos) {
          const row = dictRows.find((r) => canonicalPosLabel((r && r[0]) || "") === preferredPos);
          if (row && Array.isArray(row[1]) && row[1][0]) {
            picked = String(row[1][0]).trim();
            pickedPos = preferredPos;
          }
        }

        if (!picked && direct) picked = String(direct).trim();
        if (!picked && dictRows[0] && Array.isArray(dictRows[0][1]) && dictRows[0][1][0]) {
          picked = String(dictRows[0][1][0]).trim();
          pickedPos = canonicalPosLabel(dictRows[0][0] || "");
        }
        if (!picked) throw new Error("단어 뜻을 찾지 못했습니다.");
        return { text: picked, provider: "Google 단어사전", pos: pickedPos };
      }

      async function fetchWordMeta(word, signal) {
        const w = normalizeEnglishLookup(word);
        if (!w) return { phonetic: "", posCandidates: [] };
        const res = await fetch(DICTIONARY_API + encodeURIComponent(w), { signal });
        if (!res.ok) return { phonetic: "", posCandidates: [] };
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return { phonetic: "", posCandidates: [] };
        const entry = data[0] || {};
        let phonetic = "";
        if (typeof entry.phonetic === "string" && entry.phonetic.trim()) {
          phonetic = entry.phonetic.trim();
        } else {
          const phonetics = Array.isArray(entry.phonetics) ? entry.phonetics : [];
          for (const p of phonetics) {
            if (p && typeof p.text === "string" && p.text.trim()) {
              phonetic = p.text.trim();
              break;
            }
          }
        }

        const posSet = new Set();
        const meanings = Array.isArray(entry.meanings) ? entry.meanings : [];
        for (const m of meanings) {
          const rawPos = m && m.partOfSpeech;
          const c = canonicalPosLabel(rawPos);
          if (c) posSet.add(c);
        }
        return { phonetic, posCandidates: Array.from(posSet) };
      }

      /** @returns {{ text: string, provider: string }} */
      async function translateEnglishToKorean(query, signal) {
        try {
          const ko = await translateEnToKoGtx(query, signal);
          return { text: ko, provider: "Google 번역" };
        } catch (_) {
          /* fall through */
        }
        const key = getGoogleTranslateApiKey();
        if (key) {
          try {
            const ko = await translateEnToKoGoogleCloud(query, key, signal);
            return { text: ko, provider: "Google Cloud Translation" };
          } catch (_) {
            /* fall through */
          }
        }
        const ko = await translateEnToKoMyMemory(query, signal);
        return { text: ko, provider: "MyMemory (백업)" };
      }

      function googleTranslateWebUrl(enText) {
        return (
          "https://translate.google.com/?sl=en&tl=ko&op=translate&text=" +
          encodeURIComponent(enText || "")
        );
      }

      async function fetchAndShowWordDefinition(displayWord, lookupKey, contextSentence, wordIndex) {
        const panel = document.getElementById("wordDefPanel");
        const titleEl = document.getElementById("wordDefTitle");
        const bodyEl = document.getElementById("wordDefBody");
        if (!panel || !titleEl || !bodyEl) return;

        panel.hidden = false;
        const displayLabel = (displayWord || lookupKey || "").trim() || lookupKey;
        titleEl.textContent = displayLabel;
        wordDefLookupKey = lookupKey || "";

        const query = String(displayWord || lookupKey || "").trim();
        if (!query) return;
        bodyEl.innerHTML = `<span class="meta">한글 번역 불러오는 중…</span>`;

        if (wordLookupAbort) wordLookupAbort.abort();
        const ac = new AbortController();
        wordLookupAbort = ac;
        const t = window.setTimeout(() => ac.abort(), 14000);

        try {
          if (wordLookupAbort !== ac) return;
          const [result, wordMeta] = await Promise.all([
            (async () => {
              try {
                return await translateWordWithContextBias(query, contextSentence, wordIndex, ac.signal);
              } catch (_) {
                return await translateEnglishToKorean(query, ac.signal);
              }
            })(),
            fetchWordMeta(lookupKey || query, ac.signal),
          ]);
          window.clearTimeout(t);
          if (wordLookupAbort !== ac) return;
          const preferredPos = inferPreferredPos(contextSentence, wordIndex);
          let resolvedPos = canonicalPosLabel(result.pos || "");
          if (!resolvedPos && preferredPos && wordMeta.posCandidates.includes(preferredPos)) {
            resolvedPos = preferredPos;
          }
          if (!resolvedPos && wordMeta.posCandidates.length > 0) {
            resolvedPos = wordMeta.posCandidates[0];
          }
          const posKo = posLabelKorean(resolvedPos);
          titleEl.textContent = wordMeta.phonetic ? `${displayLabel} ${wordMeta.phonetic}` : displayLabel;
          bodyEl.innerHTML = `
            <p class="word-def-ko-main">${escapeHtml(result.text)}</p>
            ${
              posKo
                ? `<p class="meta" style="margin:0.3rem 0 0;line-height:1.45;">
                     품사 · ${escapeHtml(posKo)}${
                       resolvedPos ? ` (${escapeHtml(resolvedPos)})` : ""
                     }
                   </p>`
                : ""
            }
            <p class="meta" style="margin:0.35rem 0 0;font-size:0.76rem;line-height:1.45;">
              <a href="${escapeHtml(googleTranslateWebUrl(query))}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">구글 번역 웹에서 보기 ↗</a>
            </p>`;
          if (wordLookupAbort === ac) wordLookupAbort = null;
        } catch (e) {
          window.clearTimeout(t);
          if (e.name === "AbortError") return;
          if (wordLookupAbort !== ac) return;
          const msg =
            e && e.message
              ? escapeHtml(String(e.message))
              : "네트워크 오류로 번역하지 못했습니다.";
          bodyEl.innerHTML = `<p class="word-def-error">${msg}</p>
            <p class="meta" style="margin:0.5rem 0 0;line-height:1.45;">
              <a href="${escapeHtml(googleTranslateWebUrl(query))}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">구글 번역 웹에서 직접 보기 ↗</a>
            </p>`;
          if (wordLookupAbort === ac) wordLookupAbort = null;
        }
      }

      function getEnglishVoices() {
        if (!("speechSynthesis" in window)) return [];
        const voices = window.speechSynthesis.getVoices();
        return voices.filter((v) => /^en(-|_)/i.test(v.lang || ""));
      }

      function getSavedVoiceUri() {
        try {
          return localStorage.getItem(TTS_VOICE_KEY) || "";
        } catch {
          return "";
        }
      }

      function setSavedVoiceUri(uri) {
        try {
          if (uri) localStorage.setItem(TTS_VOICE_KEY, uri);
        } catch {}
      }

      function isLikelyFemaleVoice(voice) {
        const n = String(voice?.name || "").toLowerCase();
        const femaleHints = [
          "samantha",
          "aria",
          "zira",
          "jenny",
          "ava",
          "victoria",
          "female",
          "woman",
          "google us english",
        ];
        return femaleHints.some((hint) => n.includes(hint));
      }

      function getSavedTtsRate() {
        try {
          const raw = localStorage.getItem(TTS_RATE_KEY);
          const v = Number(raw);
          if (Number.isFinite(v) && v >= 0.5 && v <= 1.2) return v;
        } catch {}
        return 0.7;
      }

      function setSavedTtsRate(rate) {
        const n = Number(rate);
        if (!Number.isFinite(n)) return;
        const clamped = Math.max(0.5, Math.min(1.2, n));
        try {
          localStorage.setItem(TTS_RATE_KEY, String(clamped));
        } catch {}
      }

      function getSavedCardFace() {
        try {
          const v = localStorage.getItem(CARD_FACE_KEY);
          if (v === "en") return "en";
          return "ko";
        } catch {
          return "ko";
        }
      }

      function setSavedCardFace(face) {
        const v = face === "en" ? "en" : "ko";
        try {
          localStorage.setItem(CARD_FACE_KEY, v);
        } catch {}
      }

      function isKoreanCardFaceFirst() {
        return getSavedCardFace() !== "en";
      }

      function chooseVoice(voices) {
        if (!voices.length) return null;
        const saved = getSavedVoiceUri();
        if (saved) {
          const matched = voices.find((v) => v.voiceURI === saved);
          if (matched) return matched;
        }
        const femaleFirst = voices.find((v) => isLikelyFemaleVoice(v));
        if (femaleFirst) return femaleFirst;
        const preferredNames = ["Samantha", "Google US English", "Microsoft Aria Online"];
        const preferred = voices.find((v) =>
          preferredNames.some((name) => (v.name || "").includes(name))
        );
        return preferred || voices[0];
      }

      function getVoiceOptionsHtml() {
        const voices = getEnglishVoices();
        if (!voices.length) return "";
        const selected = chooseVoice(voices);
        return `<select id="ttsVoiceSelect" class="tts-voice" aria-label="영어 TTS 목소리 선택">
          ${voices
            .map((v) => {
              const selectedAttr = selected && v.voiceURI === selected.voiceURI ? "selected" : "";
              return `<option value="${escapeHtml(v.voiceURI)}" ${selectedAttr}>${escapeHtml(
                `${v.name} (${v.lang})`
              )}</option>`;
            })
            .join("")}
        </select>`;
      }

      function speakEnglish(text) {
        if (!("speechSynthesis" in window)) {
          alert("이 브라우저는 음성 읽기(TTS)를 지원하지 않습니다.");
          return;
        }
        const content = typeof text === "string" ? text.trim() : "";
        if (!content) return;
        const voices = getEnglishVoices();
        const selected = chooseVoice(voices);
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(content);
        u.lang = selected?.lang || "en-US";
        u.voice = selected || null;
        u.rate = getSavedTtsRate();
        u.pitch = 1;
        window.speechSynthesis.speak(u);
      }

      function createTruthStudyState(group) {
        // 진리발표 모드는 truth.json에 정의된 순서(카드 id 오름차순)대로 진행.
        const picks = group.cards
          .slice()
          .sort((a, b) => a.localId - b.localId);
        return {
          chapter: group.chapter,
          title: group.title,
          picks,
          index: 0,
          revealed: false,
        };
      }

      function renderTruthChapterPicker(groups) {
        dateLine.textContent = todayKey();

        const chapterButtons = groups

      function renderTruthStudy(state, groups) {
        const { picks, index, revealed } = state;
        dateLine.textContent = todayKey();

        if (picks.length === 0) {
          app.innerHTML = `<div class="error">선택한 챕터에 카드가 없습니다.</div>`;
          return;
        }

        if (index >= picks.length) {
          app.innerHTML = `
            <div class="done">
              <h2>Chapter ${state.chapter} 완료</h2>
              <p class="meta">${escapeHtml(state.title || "선택한 챕터")} 학습을 마쳤습니다.</p>
              <div class="actions" style="justify-content:center;margin-top:1rem;">
                <button type="button" class="primary" id="btnTruthReplay">챕터 다시 학습</button>
                <button type="button" class="ghost" id="btnTruthList">챕터 선택</button>
              </div>
            </div>`;
          document.getElementById("btnTruthReplay").onclick = () => {
            const group = groups.find((g) => g.chapter === state.chapter);
            if (!group) return;
            renderTruthStudy(createTruthStudyState(group), groups);
          };
          document.getElementById("btnTruthList").onclick = () => {
            renderTruthChapterPicker(groups);
          };
          return;
        }

        const card = picks[index];
        const bars = picks
          .map((_, i) => `<span class="${i <= index ? "on" : ""}"></span>`)
          .join("");
        const titleLabel = state.title ? ` · ${escapeHtml(state.title)}` : "";
        const cardMain = buildSituationAnswerCardMain(card, revealed);

        app.innerHTML = `
          <div class="progress">${bars}</div>
          <div class="pill" style="margin-bottom:0.75rem;">Chapter ${state.chapter}${titleLabel} · ${index + 1} / ${picks.length} · 카드 ID ${card.localId}</div>
          <div class="card-shell" id="cardTap" tabindex="0" role="button" aria-label="카드 뒤집기 또는 답 보기">
            ${cardMain}
          </div>
          <div class="actions">
            <button type="button" class="ghost" id="btnPrevCard" ${index === 0 ? "disabled" : ""}>이전</button>
            <button type="button" class="ghost" id="btnNextCard" ${index >= picks.length - 1 && !revealed ? "disabled" : ""}>${index >= picks.length - 1 && revealed ? "완료" : "다음"}</button>
            <button type="button" class="ghost push-right" id="btnTruthRestart">처음부터 다시</button>
            <button type="button" class="ghost" id="btnTruthList">챕터 선택</button>
          </div>
        `;

        const shell = document.getElementById("cardTap");
        const goReveal = () => {
          if (state.revealed) return;
          state.revealed = true;
          renderTruthStudy(state, groups);
        };
        shell.addEventListener("click", (e) => {
          if (e.target.closest("button, select, .click-en")) return;
          if (!state.revealed) goReveal();
        });
        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (!state.revealed) goReveal();
          }
        });

        const btnPrevCard = document.getElementById("btnPrevCard");
        if (btnPrevCard) {
          btnPrevCard.onclick = () => {
            if (state.index <= 0) return;
            state.index -= 1;
            state.revealed = false;
            renderTruthStudy(state, groups);
          };
        }
        const btnNextCard = document.getElementById("btnNextCard");
        if (btnNextCard) {
          btnNextCard.onclick = () => {
            const last = state.index >= picks.length - 1;
            if (last && !state.revealed) return;
            state.index += 1;
            state.revealed = false;
            renderTruthStudy(state, groups);
          };
        }
        document.getElementById("btnTruthRestart").onclick = () => {
          const group = groups.find((g) => g.chapter === state.chapter);
          if (!group) return;
          renderTruthStudy(createTruthStudyState(group), groups);
        };
        document.getElementById("btnTruthList").onclick = () => {
          renderTruthChapterPicker(groups);
        };
        const btnSpeakAnswer = document.getElementById("btnSpeakAnswer");
        if (btnSpeakAnswer) {
          btnSpeakAnswer.onclick = () => {
            speakEnglish(card.answer);
          };
        }
        const ttsVoiceSelect = document.getElementById("ttsVoiceSelect");
        if (ttsVoiceSelect) {
          ttsVoiceSelect.onchange = () => {
            const uri = String(ttsVoiceSelect.value || "");
            setSavedVoiceUri(uri);
          };
        }
        initExamplesToggle();
      }

          <div class="actions">${verbButtons}</div>
          <div class="actions" style="margin-top:0.75rem;">
            <button type="button" class="ghost" id="btnVerbModeBack">모드 선택으로</button>
          </div>
        `;
        app.querySelectorAll(".verb-group-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const verbKey = btn.dataset.verbKey;
            const group = groups.find((g) => g.key === verbKey);
            if (!group) return;
            if (group.units.length === 1) {
              renderVerbStudy(createVerbStudyState(group.key, group.units[0]), groups);
              return;
            }
            renderVerbUnitPicker(group, groups);
          });
        });
        document.getElementById("btnVerbModeBack").onclick = () => {
          renderModePicker();
        };
      }

      function renderVerbUnitPicker(verbGroup, allGroups) {
        dateLine.textContent = todayKey();
        const unitButtons = verbGroup.units
          .map(
            (u) =>
              `<button type="button" class="primary verb-unit-btn" data-unit-id="${escapeHtml(u.unitId)}">${escapeHtml(u.unitId)}${
                u.label ? ` · ${escapeHtml(u.label)}` : ""
              } (${u.cards.length}문장)</button>`
          )
          .join("");
        app.innerHTML = `
          <div class="gate-panel">
            <strong>${escapeHtml(verbGroup.key)}</strong> · 같은 동사라도 의미·일차(Day)마다 카드를 나눌 수 있습니다. 블록을 선택하세요.
          </div>
          <div class="actions">${unitButtons}</div>
          <div class="actions" style="margin-top:0.75rem;">
            <button type="button" class="ghost" id="btnVerbUnitBackVerbs">동사 선택으로</button>
            <button type="button" class="ghost" id="btnVerbUnitBackMode">모드 선택으로</button>
          </div>
        `;
        app.querySelectorAll(".verb-unit-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const unitId = btn.dataset.unitId;
            const unit = verbGroup.units.find((u) => u.unitId === unitId);
            if (!unit) return;
            renderVerbStudy(createVerbStudyState(verbGroup.key, unit), allGroups);
          });
        });
        document.getElementById("btnVerbUnitBackVerbs").onclick = () => {
          renderVerbPicker(allGroups);
        };
        document.getElementById("btnVerbUnitBackMode").onclick = () => {
          renderModePicker();
        };
      }

      function verbUnitSubtitle(state) {
        const parts = [state.verbKey];
        if (state.unitId && state.unitId !== "all") parts.push(state.unitId);
        if (state.unitLabel) parts.push(state.unitLabel);
        return parts.join(" · ");
      }

      function renderVerbStudy(state, groups) {
        const { picks, index, revealed } = state;
        dateLine.textContent = todayKey();
        const verbGroup = groups.find((g) => g.key === state.verbKey);
        const multiUnit = verbGroup && verbGroup.units.length > 1;

        if (picks.length === 0) {
          app.innerHTML = `<div class="error">선택한 동사에 예문이 없습니다.</div>`;
          return;
        }

        if (index >= picks.length) {
          app.innerHTML = `
            <div class="done">
              <h2>${escapeHtml(verbUnitSubtitle(state))} 완료</h2>
              <p class="meta">${picks.length}개 예문을 모두 확인했습니다.</p>
              <div class="actions" style="justify-content:center;margin-top:1rem;flex-wrap:wrap;">
                <button type="button" class="primary" id="btnVerbReplay">다시 학습</button>
                ${
                  multiUnit
                    ? `<button type="button" class="ghost" id="btnVerbPickUnitFromDone">다른 Day</button>`
                    : ""
                }
                <button type="button" class="ghost" id="btnVerbPickOther">동사 선택</button>
                <button type="button" class="ghost" id="btnVerbModeFromDone">모드 선택</button>
              </div>
            </div>`;
          document.getElementById("btnVerbReplay").onclick = () => {
            const unit = findVerbUnit(groups, state.verbKey, state.unitId);
            if (!unit) return;
            renderVerbStudy(createVerbStudyState(state.verbKey, unit), groups);
          };
          if (multiUnit) {
            document.getElementById("btnVerbPickUnitFromDone").onclick = () => {
              if (!verbGroup) return;
              renderVerbUnitPicker(verbGroup, groups);
            };
          }
          document.getElementById("btnVerbPickOther").onclick = () => {
            renderVerbPicker(groups);
          };
          document.getElementById("btnVerbModeFromDone").onclick = () => {
            renderModePicker();
          };
          return;
        }

        const card = picks[index];
        const bars = picks
          .map((_, i) => `<span class="${i <= index ? "on" : ""}"></span>`)
          .join("");

        const verbCardMain = buildVerbCardMain(card, revealed);

        app.innerHTML = `
          <div class="progress">${bars}</div>
          <div class="pill" style="margin-bottom:0.75rem;">동사 · ${escapeHtml(verbUnitSubtitle(state))} · ${index + 1} / ${picks.length}</div>
          <div class="card-shell" id="verbCardTap" tabindex="0" role="button" aria-label="답 보기">
            ${verbCardMain}
          </div>
          <div class="actions">
            <button type="button" class="ghost" id="btnVerbPrev" ${index === 0 ? "disabled" : ""}>이전</button>
            <button type="button" class="ghost" id="btnVerbNext" ${index >= picks.length - 1 && !revealed ? "disabled" : ""}>${index >= picks.length - 1 && revealed ? "완료" : "다음"}</button>
            <button type="button" class="ghost push-right" id="btnVerbRestart">처음부터</button>
            ${
              multiUnit
                ? `<button type="button" class="ghost" id="btnVerbToUnitPicker">Day 선택</button>`
                : ""
            }
            <button type="button" class="ghost" id="btnVerbToPicker">동사 선택</button>
          </div>
        `;

        const shell = document.getElementById("verbCardTap");
        const goReveal = () => {
          if (state.revealed) return;
          state.revealed = true;
          renderVerbStudy(state, groups);
        };
        shell.addEventListener("click", (e) => {
          if (e.target.closest("button, select, .click-en")) return;
          if (!state.revealed) goReveal();
        });
        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (!state.revealed) goReveal();
          }
        });

        document.getElementById("btnVerbPrev").onclick = () => {
          if (state.index <= 0) return;
          state.index -= 1;
          state.revealed = false;
          renderVerbStudy(state, groups);
        };
        document.getElementById("btnVerbNext").onclick = () => {
          const last = state.index >= picks.length - 1;
          if (last && !state.revealed) return;
          state.index += 1;
          state.revealed = false;
          renderVerbStudy(state, groups);
        };
        document.getElementById("btnVerbRestart").onclick = () => {
          const unit = findVerbUnit(groups, state.verbKey, state.unitId);
          if (!unit) return;
          renderVerbStudy(createVerbStudyState(state.verbKey, unit), groups);
        };
        const btnVerbToUnitPicker = document.getElementById("btnVerbToUnitPicker");
        if (btnVerbToUnitPicker && verbGroup) {
          btnVerbToUnitPicker.onclick = () => {
            renderVerbUnitPicker(verbGroup, groups);
          };
        }
        document.getElementById("btnVerbToPicker").onclick = () => {
          renderVerbPicker(groups);
        };
        const btnVerbSpeakEnglish = document.getElementById("btnVerbSpeakEnglish");
        if (btnVerbSpeakEnglish) {
          btnVerbSpeakEnglish.onclick = () => {
            speakEnglish(card.english);
          };
        }
        const ttsVoiceVerb = document.getElementById("ttsVoiceSelect");
        if (ttsVoiceVerb) {
          ttsVoiceVerb.onchange = () => {
            const uri = String(ttsVoiceVerb.value || "");
            setSavedVoiceUri(uri);
          };
        }
      }

      async function startDailyMode() {
        let groups;
        try {
          const res = await fetch(DAILY_DATA_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          groups = validateTruthChapters(await res.json());
        } catch (e) {
          app.innerHTML = `
            <div class="error">
              <strong>데이터를 불러오지 못했습니다.</strong><br />
              같은 폴더에서 정적 서버를 띄운 뒤 열어 주세요.<br />
              <code>cd random-card && python3 -m http.server 8080</code><br />
              그다음 <code>http://localhost:8080/</code><br /><br />
              <span class="meta">${escapeHtml(String(e.message || e))}</span>
            </div>`;
          return;
        }
        if (groups.length === 1) {
          const state = createTruthStudyState(groups[0]);
          renderTruthStudy(state, groups);
        } else {
          renderTruthChapterPicker(groups);
        }
      }

      async function startTruthMode() {
        let groups;
        try {
          const res = await fetch(TRUTH_DATA_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          groups = validateTruthChapters(await res.json());
        } catch (e) {
          app.innerHTML = `
            <div class="error">
              <strong>진리발표 데이터를 불러오지 못했습니다.</strong><br />
              <code>data/truth.json</code> 파일을 확인해 주세요.<br /><br />
              <span class="meta">${escapeHtml(String(e.message || e))}</span>
            </div>`;
          return;
        }
        renderTruthChapterPicker(groups);
      }

      async function startVerbsMode() {
        let groups;
        try {
          const res = await fetch(VERBS_DATA_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          groups = validateVerbLexicon(await res.json());
        } catch (e) {
          app.innerHTML = `
            <div class="error">
              <strong>기본동사 데이터를 불러오지 못했습니다.</strong><br />
              <code>data/verbs.json</code> 형식을 확인해 주세요.<br /><br />
              <span class="meta">${escapeHtml(String(e.message || e))}</span>
            </div>`;
          return;
        }
        renderVerbPicker(groups);
      }

      function renderModePicker() {
        dateLine.textContent = todayKey();
        const ttsRate = getSavedTtsRate();
        const face = getSavedCardFace();
        const selKo = face === "ko" ? "selected" : "";
        const selEn = face === "en" ? "selected" : "";
        app.innerHTML = `
          <div class="gate-panel">
            <strong>학습 모드 선택</strong> · 오늘은 어떤 모드로 학습할지 선택하세요.
          </div>
          <div class="gate-panel" style="margin-top:0.6rem;">
            <strong>설정</strong>
            <div style="margin-top:0.65rem;display:flex;flex-direction:column;gap:0.85rem;">
              <div>
                <strong style="font-size:0.88rem;">카드 첫 화면</strong>
                <div style="margin-top:0.4rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                  <label for="modeCardFace" class="meta" style="font-size:0.8rem;">앞면 언어</label>
                  <select id="modeCardFace" class="tts-voice" aria-label="카드 앞면 언어">
                    <option value="ko" ${selKo}>한국어</option>
                    <option value="en" ${selEn}>영어</option>
                  </select>
                </div>
                <p class="meta" style="margin:0.35rem 0 0;font-size:0.76rem;line-height:1.45;">처음에 보일 면입니다. 카드를 누르면 반대쪽 내용이 함께 보입니다.</p>
              </div>
              <div>
                <strong style="font-size:0.88rem;">TTS 재생속도</strong>
                <div style="margin-top:0.4rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                  <label for="modeTtsRate" class="meta" style="font-size:0.8rem;">읽기 속도</label>
                  <select id="modeTtsRate" class="tts-voice" aria-label="TTS 재생속도 선택">
                    ${[0.5, 0.6, 0.7, 0.8, 0.9, 1.0]
                      .map((rate) => {
                        const selected = Math.abs(ttsRate - rate) < 0.001 ? "selected" : "";
                        return `<option value="${rate.toFixed(1)}" ${selected}>${rate.toFixed(1)}x</option>`;
                      })
                      .join("")}
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="primary" id="btnModeDaily">일상 생활</button>
            <button type="button" class="primary" id="btnModeTruth">진리발표</button>
            <button type="button" class="primary" id="btnModeVerbs">기본동사</button>
          </div>
        `;
        document.getElementById("btnModeDaily").onclick = () => {
          startDailyMode();
        };
        document.getElementById("btnModeTruth").onclick = () => {
          startTruthMode();
        };
        document.getElementById("btnModeVerbs").onclick = () => {
          startVerbsMode();
        };
        const modeTtsRate = document.getElementById("modeTtsRate");
        if (modeTtsRate) {
          modeTtsRate.onchange = () => {
            setSavedTtsRate(modeTtsRate.value);
          };
        }
        const modeCardFace = document.getElementById("modeCardFace");
        if (modeCardFace) {
          modeCardFace.onchange = () => {
            setSavedCardFace(modeCardFace.value);
          };
        }
      }

      function main() {
        initEnglishWordLookup();
        if ("speechSynthesis" in window) {
          // 일부 브라우저는 getVoices()를 미리 호출해야 음성 목록이 채워집니다.
          window.speechSynthesis.getVoices();
        }
        renderModePicker();
      }

      main();
    })();
  </script>
</body>
</html>
