<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>English Random Card</title>
  <style>
    :root {
      --bg: #0f1218;
      --surface: #171c26;
      --border: #2a3344;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6c9eff;
      --accent-dim: #4a74c4;
      --success: #5ecf8a;
      --radius: 14px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: radial-gradient(1200px 800px at 50% -10%, #1a2436 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #1f2a3c;
      border: 1px solid #3d4f6f;
      color: #d8e4ff;
      box-shadow: 0 0 0 1px rgba(108, 158, 255, 0.15), 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .progress {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .progress span {
      flex: 1;
      height: 5px;
      border-radius: 999px;
      background: #2f3b52;
    }

    .progress span.on {
      background: #7db2ff;
      box-shadow: 0 0 8px rgba(125, 178, 255, 0.55);
    }

    .card-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem 1.25rem 1.15rem;
      min-height: 220px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .card-shell:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .card-shell:hover {
      border-color: #3d4a63;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .situation {
      font-size: 1.05rem;
      font-weight: 500;
      white-space: pre-line;
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .answer-block {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .answer {
      font-size: 0.98rem;
      color: #dbe4f5;
      white-space: pre-line;
    }

    .actions {
      margin-top: 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .actions .push-right {
      margin-left: auto;
    }

    button {
      font: inherit;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #222a38;
      color: var(--text);
      padding: 0.55rem 0.9rem;
      font-size: 0.88rem;
    }

    button.primary {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      border-color: transparent;
      color: #0b1020;
      font-weight: 600;
    }

    button.ghost {
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .done {
      text-align: center;
      padding: 2rem 1rem;
    }

    .done h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }

    .error {
      background: #2a1518;
      border: 1px solid #5c2a32;
      color: #f0c4c8;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }

    .error code {
      font-size: 0.82em;
    }

    footer.note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .gate-panel {
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border-radius: var(--radius);
      background: #1a2230;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .gate-panel strong {
      color: var(--accent);
      font-weight: 600;
    }

    .gate-rows {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .gate-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .gate-row span.n {
      min-width: 2.5rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .gate-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }

    .gate-bar i {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>English Random Card</h1>
      <span class="meta" id="dateLine"></span>
    </header>
    <div id="app"></div>
    <footer class="note">
      데이터: <code>data/cards.json</code>, <code>data/truth.json</code> · 로컬에서 열 때는 <code>python3 -m http.server</code> 등으로 같은 폴더를 서빙한 뒤 접속하세요.
    </footer>
  </div>

  <script>
    (function () {
      const DAILY_DATA_URL = "data/cards.json";
      const TRUTH_DATA_URL = "data/truth.json";
      const STORAGE_KEY = "english-random-card-session";
      const STORAGE_VERSION = 3;
      const PROGRESS_KEY = "english-random-card-study-progress";
      const PROGRESS_VERSION = 1;
      /** studyDate 기준: 오늘 6회 → 어제 4회 → 그제 2회 순차 게이트 후, 날짜 구간별 6:4:2 가중 */
      const SEQ_GOALS = { today: 6, yesterday: 4, dayBefore: 2 };
      /** 같은 날 같은 카드가 두 번 나오지 않도록 고정 */
      const ALLOW_SAME_CARD_TWICE_SAME_DAY = false;
      const WEIGHTS = { latest: 6, prev: 4, older: 2 };
      const DAILY_COUNT = 3;
      const MAX_SAMPLE_TRIES = 200;

      function todayKey() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function addCalendarDays(ymd, deltaDays) {
        const [y, m, d] = ymd.split("-").map(Number);
        const dt = new Date(y, m - 1, d);
        dt.setDate(dt.getDate() + deltaDays);
        const yy = dt.getFullYear();
        const mm = String(dt.getMonth() + 1).padStart(2, "0");
        const dd = String(dt.getDate()).padStart(2, "0");
        return `${yy}-${mm}-${dd}`;
      }

      function deckFingerprint(cards) {
        return `${cards.length}|${cards.map((c) => `${c.id}:${c.studyDate}`).sort().join(",")}`;
      }

      function maxRound(cards) {
        return cards.reduce((m, c) => Math.max(m, c.round), -Infinity);
      }

      function validateDailyCards(raw) {
        if (!Array.isArray(raw)) throw new Error("JSON 최상위는 배열이어야 합니다.");
        const out = [];
        raw.forEach((row, i) => {
          if (!row || typeof row !== "object") throw new Error(`항목 ${i}: 객체가 아닙니다.`);
          const situation = row.situation;
          const answer = row.answer;
          const round = row.round;
          const studyDate = row.studyDate;
          if (typeof situation !== "string" || !situation.trim()) {
            throw new Error(`항목 ${i}: situation은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (typeof answer !== "string" || !answer.trim()) {
            throw new Error(`항목 ${i}: answer은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (!Number.isInteger(round)) {
            throw new Error(`항목 ${i}: round는 정수여야 합니다.`);
          }
          if (typeof studyDate !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(studyDate.trim())) {
            throw new Error(
              `항목 ${i}: studyDate는 YYYY-MM-DD 형식 문자열이어야 합니다. (예: "2026-04-19")`
            );
          }
          const id =
            typeof row.id === "string" && row.id.trim()
              ? row.id
              : `idx-${i}`;
          out.push({
            id,
            round,
            studyDate: studyDate.trim(),
            situation: situation.trim(),
            answer: answer.trim(),
          });
        });
        if (out.length === 0) throw new Error("카드가 한 장도 없습니다.");
        return out;
      }

      function validateTruthChapters(raw) {
        if (!Array.isArray(raw)) throw new Error("JSON 최상위는 배열이어야 합니다.");
        const out = raw.map((row, i) => {
          if (!row || typeof row !== "object") throw new Error(`챕터 ${i}: 객체가 아닙니다.`);
          const chapter = row.chapter;
          const title = row.title;
          const cards = row.cards;
          if (!Number.isInteger(chapter)) {
            throw new Error(`챕터 ${i}: chapter는 정수여야 합니다.`);
          }
          if (typeof title !== "string" || !title.trim()) {
            throw new Error(`챕터 ${i}: title은 비어 있지 않은 문자열이어야 합니다.`);
          }
          if (!Array.isArray(cards) || cards.length === 0) {
            throw new Error(`챕터 ${i}: cards는 비어 있지 않은 배열이어야 합니다.`);
          }
          const normalizedCards = cards.map((card, ci) => {
            if (!card || typeof card !== "object") {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: 객체가 아닙니다.`);
            }
            if (!Number.isInteger(card.id)) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: id는 정수여야 합니다.`);
            }
            const situation = card.situation;
            const answer = card.answer;
            if (typeof situation !== "string" || !situation.trim()) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: situation은 비어 있지 않은 문자열이어야 합니다.`);
            }
            if (typeof answer !== "string" || !answer.trim()) {
              throw new Error(`챕터 ${chapter}, 카드 ${ci}: answer은 비어 있지 않은 문자열이어야 합니다.`);
            }
            return {
              id: `${chapter}-${card.id}`,
              localId: card.id,
              situation: situation.trim(),
              answer: answer.trim(),
            };
          });
          return {
            chapter,
            title: title.trim(),
            cards: normalizedCards,
          };
        });
        if (out.length === 0) throw new Error("카드가 한 장도 없습니다.");
        return out;
      }

      function allMeetGoal(pool, counts, goal) {
        if (!pool.length) return true;
        return pool.every((c) => (counts[c.id] || 0) >= goal);
      }

      /** 오늘 → 어제 → 그제 순으로, 해당 날짜 카드가 목표 회수에 도달했는지 검사 */
      function getSequentialGate(cards, todayStr, counts) {
        const steps = [
          { day: todayStr, goal: SEQ_GOALS.today },
          { day: addCalendarDays(todayStr, -1), goal: SEQ_GOALS.yesterday },
          { day: addCalendarDays(todayStr, -2), goal: SEQ_GOALS.dayBefore },
        ];
        for (const { day, goal } of steps) {
          const pool = cards.filter((c) => c.studyDate === day);
          if (!pool.length) continue;
          if (!allMeetGoal(pool, counts, goal)) return { pool, goal, day };
        }
        return null;
      }

      function partitionByRelativeStudyDate(cards, todayStr) {
        const y1 = addCalendarDays(todayStr, -1);
        const latest = cards.filter((c) => c.studyDate === todayStr);
        const prev = cards.filter((c) => c.studyDate === y1);
        const older = cards.filter((c) => c.studyDate < y1);
        return { latest, prev, older };
      }

      function loadProgress(cards) {
        try {
          const raw = localStorage.getItem(PROGRESS_KEY);
          if (!raw) return { counts: {} };
          const o = JSON.parse(raw);
          if (o.version !== PROGRESS_VERSION) return { counts: {} };
          const counts = {};
          for (const c of cards) {
            const v = o.counts && o.counts[c.id];
            counts[c.id] =
              typeof v === "number" && Number.isFinite(v) ? Math.max(0, Math.floor(v)) : 0;
          }
          return { counts };
        } catch {
          return { counts: {} };
        }
      }

      function saveProgress(cards, counts) {
        const o = {};
        for (const c of cards) {
          o[c.id] = counts[c.id] || 0;
        }
        localStorage.setItem(
          PROGRESS_KEY,
          JSON.stringify({ version: PROGRESS_VERSION, counts: o })
        );
      }

      function pickWeightedTier(tiers, weights) {
        const entries = [
          { key: "latest", cards: tiers.latest, w: weights.latest },
          { key: "prev", cards: tiers.prev, w: weights.prev },
          { key: "older", cards: tiers.older, w: weights.older },
        ].filter((e) => e.cards.length > 0);
        if (entries.length === 0) return null;
        const total = entries.reduce((s, e) => s + e.w, 0);
        let r = Math.random() * total;
        for (const e of entries) {
          r -= e.w;
          if (r <= 0) return e;
        }
        return entries[entries.length - 1];
      }

      function pickRandomFrom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      /** Fisher–Yates. JSON·id 순서와 무관하게 그날 1→2→3번째 순서를 만듦. */
      function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      /**
       * studyDate 기준 달력 오늘/어제/그제 순차 게이트(6·4·2회) 통과 전에는 해당 구간 카드만 출제.
       * 통과 후에는 오늘/어제/그 이전 날짜 묶음에 가중치 6:4:2.
       */
      function pickDailyCards(cards, completionCounts) {
        const todayStr = todayKey();
        const counts = completionCounts || {};
        const gate = getSequentialGate(cards, todayStr, counts);

        if (gate) {
          const pool = gate.pool.slice();
          shuffleInPlace(pool);
          const n = Math.min(DAILY_COUNT, pool.length);
          const chosen = pool.slice(0, n);
          return { picks: chosen, gated: true };
        }

        const tiers = partitionByRelativeStudyDate(cards, todayStr);
        const mutable = {
          latest: tiers.latest.slice(),
          prev: tiers.prev.slice(),
          older: tiers.older.slice(),
        };
        const chosen = [];
        const used = new Set();

        const totalAvailable = cards.length;
        const target = Math.min(DAILY_COUNT, totalAvailable);

        let tries = 0;
        while (chosen.length < target && tries < MAX_SAMPLE_TRIES) {
          tries++;
          const entry = pickWeightedTier(mutable, WEIGHTS);
          if (!entry) break;
          const poolKey = entry.key;
          const pool =
            poolKey === "latest" ? mutable.latest : poolKey === "prev" ? mutable.prev : mutable.older;
          if (pool.length === 0) continue;
          const card = pickRandomFrom(pool);
          if (!ALLOW_SAME_CARD_TWICE_SAME_DAY && used.has(card.id)) continue;
          used.add(card.id);
          chosen.push(card);
          const idx = pool.findIndex((c) => c.id === card.id);
          if (idx !== -1) pool.splice(idx, 1);
        }

        if (chosen.length < target) {
          const rest = cards.filter((c) => !used.has(c.id));
          while (chosen.length < target && rest.length > 0) {
            const c = pickRandomFrom(rest);
            const i = rest.findIndex((x) => x.id === c.id);
            rest.splice(i, 1);
            if (!ALLOW_SAME_CARD_TWICE_SAME_DAY && used.has(c.id)) continue;
            used.add(c.id);
            chosen.push(c);
          }
        }

        shuffleInPlace(chosen);
        return { picks: chosen, gated: false };
      }

      function loadSession() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const o = JSON.parse(raw);
          if (o.version !== STORAGE_VERSION || !o.date || !Array.isArray(o.pickIds)) return null;
          return o;
        } catch {
          return null;
        }
      }

      function saveSession(state) {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            version: STORAGE_VERSION,
            date: state.date,
            pickIds: state.pickIds,
            index: state.index,
            revealed: state.revealed,
            fingerprint: state.fingerprint,
          })
        );
      }

      function clearSession() {
        localStorage.removeItem(STORAGE_KEY);
      }

      function clearProgress() {
        localStorage.removeItem(PROGRESS_KEY);
      }

      function resolvePicksFromSession(cards, session) {
        const map = new Map(cards.map((c) => [c.id, c]));
        const picks = session.pickIds.map((id) => map.get(id)).filter(Boolean);
        if (picks.length !== session.pickIds.length) return null;
        return picks;
      }

      function getOrCreateDailyState(cards, progress) {
        const date = todayKey();
        const fp = deckFingerprint(cards);
        const session = loadSession();
        if (
          session &&
          session.date === date &&
          session.fingerprint === fp &&
          session.pickIds &&
          session.pickIds.length > 0
        ) {
          const picks = resolvePicksFromSession(cards, session);
          if (picks && picks.length === session.pickIds.length) {
            const rawIdx = session.index ?? 0;
            const done = rawIdx >= picks.length;
            return {
              date,
              fingerprint: fp,
              picks,
              index: done ? picks.length : Math.max(0, Math.min(rawIdx, picks.length - 1)),
              revealed: done ? false : !!session.revealed,
            };
          }
        }
        const { picks } = pickDailyCards(cards, progress.counts);
        const st = {
          date,
          fingerprint: fp,
          picks,
          index: 0,
          revealed: false,
        };
        saveSession({
          date: st.date,
          pickIds: st.picks.map((c) => c.id),
          index: st.index,
          revealed: st.revealed,
          fingerprint: st.fingerprint,
        });
        return st;
      }

      function persistProgress(state) {
        saveSession({
          date: state.date,
          pickIds: state.picks.map((c) => c.id),
          index: state.index,
          revealed: state.revealed,
          fingerprint: state.fingerprint,
        });
      }

      const app = document.getElementById("app");
      const dateLine = document.getElementById("dateLine");

      function gatePanelHtml(cards, progress) {
        const todayStr = todayKey();
        const gate = getSequentialGate(cards, todayStr, progress.counts);
        if (!gate) return "";
        const rows = gate.pool
          .map((c) => {
            const n = progress.counts[c.id] || 0;
            const pct = Math.min(100, (n / gate.goal) * 100);
            const short =
              c.situation.length > 36 ? `${escapeHtml(c.situation.slice(0, 36))}…` : escapeHtml(c.situation);
            return `<div class="gate-row"><span class="n">${n}/${gate.goal}</span><div class="gate-bar"><i style="width:${pct}%"></i></div><span>${short}</span></div>`;
          })
          .join("");
        const phase =
          gate.day === todayStr
            ? "오늘 날짜"
            : gate.day === addCalendarDays(todayStr, -1)
              ? "어제 날짜"
              : "그제 날짜";
        return `<div class="gate-panel">
          <strong>${phase} (${escapeHtml(gate.day)})</strong> 카드만 나옵니다. 각 카드마다 답 확인 후 「다음/완료」를 <strong>${gate.goal}회</strong> 채우면 다음 단계로 넘어갑니다. 전 단계를 마치면 일일 추첨에 <strong>6 : 4 : 2</strong>(오늘·어제·그 이전 날짜) 비율이 적용됩니다.
          <div class="gate-rows">${rows}</div>
        </div>`;
      }

      function renderDaily(state, cards, progress) {
        const { picks, index, revealed } = state;
        dateLine.textContent = todayKey();

        if (picks.length === 0) {
          app.innerHTML = `<div class="error">표시할 카드가 없습니다.</div>`;
          return;
        }

        if (index >= picks.length) {
          app.innerHTML = `
            <div class="done">
              <h2>오늘 3장 완료</h2>
              <p class="meta">내일 다시 만나요.</p>
              <div class="actions" style="justify-content:center;margin-top:1rem;">
                <button type="button" class="ghost" id="btnReset">오늘 다시 뽑기 (테스트)</button>
                <button type="button" class="ghost" id="btnModeSelectDone">모드 선택</button>
              </div>
            </div>`;
          document.getElementById("btnReset").onclick = () => {
            clearSession();
            location.reload();
          };
          document.getElementById("btnModeSelectDone").onclick = () => {
            renderModePicker();
          };
          return;
        }

        const card = picks[index];
        const roundLabel = `Round ${card.round} · ${escapeHtml(card.studyDate)}`;
        const bars = picks
          .map((_, i) => `<span class="${i <= index ? "on" : ""}"></span>`)
          .join("");

        app.innerHTML = `
          ${gatePanelHtml(cards, progress)}
          <div class="progress">${bars}</div>
          <div class="pill" style="margin-bottom:0.75rem;">${roundLabel} · ${index + 1} / ${picks.length}</div>
          <div class="card-shell" id="cardTap" tabindex="0" role="button" aria-label="카드 뒤집기 또는 답 보기">
            <div class="label">Situation</div>
            <div class="situation">${escapeHtml(card.situation)}</div>
            ${
              revealed
                ? `<div class="answer-block">
                    <div class="label">Model answer</div>
                    <div class="answer">${escapeHtml(card.answer)}</div>
                  </div>`
                : `<p class="hint">말해 본 뒤 카드를 눌러 답을 확인하세요.</p>`
            }
          </div>
          <div class="actions">
            ${
              revealed
                ? `<button type="button" class="primary" id="btnNext">${
                    index < picks.length - 1 ? "다음 카드" : "완료"
                  }</button>`
                : ""
            }
            <button type="button" class="ghost" id="btnReset">오늘 다시 뽑기</button>
            <button type="button" class="ghost" id="btnModeSelect">모드 선택</button>
          </div>
        `;

        const shell = document.getElementById("cardTap");
        const goReveal = () => {
          if (state.revealed) return;
          state.revealed = true;
          persistProgress(state);
          renderDaily(state, cards, progress);
        };
        shell.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          if (!state.revealed) goReveal();
        });
        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (!state.revealed) goReveal();
          }
        });

        const btnNext = document.getElementById("btnNext");
        if (btnNext) {
          btnNext.onclick = () => {
            const current = picks[index];
            if (state.revealed && current) {
              progress.counts[current.id] = (progress.counts[current.id] || 0) + 1;
              saveProgress(cards, progress.counts);
            }
            state.index += 1;
            state.revealed = false;
            persistProgress(state);
            renderDaily(state, cards, progress);
          };
        }
        document.getElementById("btnReset").onclick = () => {
          if (confirm("오늘 뽑은 카드를 버리고 다시 뽑을까요? (날짜별 6·4·2 진도는 유지됩니다)")) {
            clearSession();
            location.reload();
          }
        };
        document.getElementById("btnModeSelect").onclick = () => {
          renderModePicker();
        };
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function createTruthStudyState(group) {
        // 진리발표 모드는 truth.json에 정의된 순서(카드 id 오름차순)대로 진행.
        const picks = group.cards
          .slice()
          .sort((a, b) => a.localId - b.localId);
        return {
          chapter: group.chapter,
          title: group.title,
          picks,
          index: 0,
          revealed: false,
        };
      }

      function renderTruthChapterPicker(groups) {
        dateLine.textContent = todayKey();
        if (!groups.length) {
          app.innerHTML = `<div class="error">진리발표 챕터 데이터가 없습니다.</div>`;
          return;
        }
        const chapterButtons = groups
          .map(
            (g) =>
              `<button type="button" class="primary truth-chapter-btn" data-chapter="${g.chapter}">Chapter ${g.chapter}${g.title ? ` · ${escapeHtml(g.title)}` : ""} (${g.cards.length}문장)</button>`
          )
          .join("");
        app.innerHTML = `
          <div class="gate-panel">
            <strong>진리발표 학습</strong> · 공부할 챕터를 선택하면 해당 문장을 순서대로 학습합니다.
          </div>
          <div class="actions">${chapterButtons}</div>
          <div class="actions" style="margin-top:0.75rem;">
            <button type="button" class="ghost" id="btnModeBack">모드 선택으로</button>
          </div>
        `;

        app.querySelectorAll(".truth-chapter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const chapter = Number(btn.dataset.chapter);
            const group = groups.find((g) => g.chapter === chapter);
            if (!group) return;
            const state = createTruthStudyState(group);
            renderTruthStudy(state, groups);
          });
        });
        document.getElementById("btnModeBack").onclick = () => {
          renderModePicker();
        };
      }

      function renderTruthStudy(state, groups) {
        const { picks, index, revealed } = state;
        dateLine.textContent = todayKey();

        if (picks.length === 0) {
          app.innerHTML = `<div class="error">선택한 챕터에 카드가 없습니다.</div>`;
          return;
        }

        if (index >= picks.length) {
          app.innerHTML = `
            <div class="done">
              <h2>Chapter ${state.chapter} 완료</h2>
              <p class="meta">${escapeHtml(state.title || "선택한 챕터")} 학습을 마쳤습니다.</p>
              <div class="actions" style="justify-content:center;margin-top:1rem;">
                <button type="button" class="primary" id="btnTruthReplay">챕터 다시 학습</button>
                <button type="button" class="ghost" id="btnTruthList">챕터 선택</button>
              </div>
            </div>`;
          document.getElementById("btnTruthReplay").onclick = () => {
            const group = groups.find((g) => g.chapter === state.chapter);
            if (!group) return;
            renderTruthStudy(createTruthStudyState(group), groups);
          };
          document.getElementById("btnTruthList").onclick = () => {
            renderTruthChapterPicker(groups);
          };
          return;
        }

        const card = picks[index];
        const bars = picks
          .map((_, i) => `<span class="${i <= index ? "on" : ""}"></span>`)
          .join("");
        const titleLabel = state.title ? ` · ${escapeHtml(state.title)}` : "";

        app.innerHTML = `
          <div class="progress">${bars}</div>
          <div class="pill" style="margin-bottom:0.75rem;">Chapter ${state.chapter}${titleLabel} · ${index + 1} / ${picks.length} · 카드 ID ${card.localId}</div>
          <div class="card-shell" id="cardTap" tabindex="0" role="button" aria-label="카드 뒤집기 또는 답 보기">
            <div class="label">Situation</div>
            <div class="situation">${escapeHtml(card.situation)}</div>
            ${
              revealed
                ? `<div class="answer-block">
                    <div class="label">Model answer</div>
                    <div class="answer">${escapeHtml(card.answer)}</div>
                  </div>`
                : `<p class="hint">말해 본 뒤 카드를 눌러 답을 확인하세요.</p>`
            }
          </div>
          <div class="actions">
            <button type="button" class="ghost" id="btnPrevCard" ${index === 0 ? "disabled" : ""}>이전</button>
            <button type="button" class="ghost" id="btnNextCard" ${index >= picks.length - 1 && !revealed ? "disabled" : ""}>${index >= picks.length - 1 && revealed ? "완료" : "다음"}</button>
            <button type="button" class="ghost push-right" id="btnTruthRestart">처음부터 다시</button>
            <button type="button" class="ghost" id="btnTruthList">챕터 선택</button>
          </div>
        `;

        const shell = document.getElementById("cardTap");
        const goReveal = () => {
          if (state.revealed) return;
          state.revealed = true;
          renderTruthStudy(state, groups);
        };
        shell.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          if (!state.revealed) goReveal();
        });
        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (!state.revealed) goReveal();
          }
        });

        const btnPrevCard = document.getElementById("btnPrevCard");
        if (btnPrevCard) {
          btnPrevCard.onclick = () => {
            if (state.index <= 0) return;
            state.index -= 1;
            state.revealed = false;
            renderTruthStudy(state, groups);
          };
        }
        const btnNextCard = document.getElementById("btnNextCard");
        if (btnNextCard) {
          btnNextCard.onclick = () => {
            const last = state.index >= picks.length - 1;
            if (last && !state.revealed) return;
            state.index += 1;
            state.revealed = false;
            renderTruthStudy(state, groups);
          };
        }
        document.getElementById("btnTruthRestart").onclick = () => {
          const group = groups.find((g) => g.chapter === state.chapter);
          if (!group) return;
          renderTruthStudy(createTruthStudyState(group), groups);
        };
        document.getElementById("btnTruthList").onclick = () => {
          renderTruthChapterPicker(groups);
        };
      }

      async function startDailyMode() {
        let cards;
        try {
          const res = await fetch(DAILY_DATA_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          cards = validateDailyCards(await res.json());
        } catch (e) {
          app.innerHTML = `
            <div class="error">
              <strong>데이터를 불러오지 못했습니다.</strong><br />
              같은 폴더에서 정적 서버를 띄운 뒤 열어 주세요.<br />
              <code>cd random-card && python3 -m http.server 8080</code><br />
              그다음 <code>http://localhost:8080/</code><br /><br />
              <span class="meta">${escapeHtml(String(e.message || e))}</span>
            </div>`;
          return;
        }

        const progress = loadProgress(cards);
        const state = getOrCreateDailyState(cards, progress);
        renderDaily(state, cards, progress);
      }

      async function startTruthMode() {
        let groups;
        try {
          const res = await fetch(TRUTH_DATA_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          groups = validateTruthChapters(await res.json());
        } catch (e) {
          app.innerHTML = `
            <div class="error">
              <strong>진리발표 데이터를 불러오지 못했습니다.</strong><br />
              <code>data/truth.json</code> 파일을 확인해 주세요.<br /><br />
              <span class="meta">${escapeHtml(String(e.message || e))}</span>
            </div>`;
          return;
        }
        renderTruthChapterPicker(groups);
      }

      function renderModePicker() {
        dateLine.textContent = todayKey();
        app.innerHTML = `
          <div class="gate-panel">
            <strong>학습 모드 선택</strong> · 오늘은 어떤 모드로 학습할지 선택하세요.
          </div>
          <div class="actions">
            <button type="button" class="primary" id="btnModeDaily">일상 생활</button>
            <button type="button" class="primary" id="btnModeTruth">진리발표</button>
          </div>
        `;
        document.getElementById("btnModeDaily").onclick = () => {
          startDailyMode();
        };
        document.getElementById("btnModeTruth").onclick = () => {
          startTruthMode();
        };
      }

      function main() {
        renderModePicker();
      }

      main();
    })();
  </script>
</body>
</html>
